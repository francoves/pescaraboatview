<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="/css/fonts.css" />
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<style>
  html,body{margin:0;height:100%;background:#e1f3fb}
  #map{width:100vw;height:100vh}
  .maplibregl-ctrl-attrib,.maplibregl-ctrl{display:none!important}
  .map-mk{display:flex;flex-direction:column;align-items:center;gap:4px;white-space:nowrap;pointer-events:none}
  .map-mk.side-bottom{flex-direction:column-reverse}
  .map-dot{width:14px;height:14px;border-radius:50%;background:#15a3a3;border:3px solid #fff;box-shadow:0 1px 5px rgba(6,37,54,.5);flex:0 0 auto}
  .map-mk-port .map-dot{background:#ff7a59}
  .map-mk-major .map-dot{width:19px;height:19px;border-width:3.5px}
  .map-lbl{font-family:"Manrope",sans-serif;font-weight:700;font-size:15px;line-height:1;color:#0a3550;background:rgba(255,255,255,.94);padding:4px 9px;border-radius:7px;box-shadow:0 1px 6px rgba(6,37,54,.22)}
  .map-mk-beach .map-lbl{color:#0f7d80}
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
const POIS=[
  {n:"Pescara",c:[14.2156,42.4664],type:"port",major:1,side:"top"},
  {n:"Francavilla al Mare",c:[14.2903,42.4184],type:"port",side:"bottom"},
  {n:"Ortona",c:[14.4046,42.3553],type:"port",side:"top"},
  {n:"Ripari di Giobbe",c:[14.4200,42.3360],type:"beach",side:"bottom"},
  {n:"Cala Turchino",c:[14.4600,42.2890],type:"beach",side:"top"},
  {n:"Punta Cavalluccio",c:[14.4830,42.2620],type:"beach",side:"bottom"},
  {n:"Punta Aderci",c:[14.7030,42.1550],type:"beach",side:"top"},
  {n:"Vasto",c:[14.6680,42.1190],type:"port",major:1,side:"bottom"},
];
const ROUTE=[[14.275,42.462],[14.345,42.415],[14.420,42.378],[14.490,42.340],[14.535,42.295],[14.575,42.250],[14.660,42.195],[14.730,42.150]];
function bearing(a,b){const r=d=>d*Math.PI/180,D=x=>x*180/Math.PI;const y=Math.sin(r(b[0]-a[0]))*Math.cos(r(b[1]));const x=Math.cos(r(a[1]))*Math.sin(r(b[1]))-Math.sin(r(a[1]))*Math.cos(r(b[1]))*Math.cos(r(b[0]-a[0]));return (D(Math.atan2(y,x))+360)%360;}
const BEARING=bearing([14.2156,42.4664],[14.6680,42.1190])-90;
const q=new URLSearchParams(location.search);
const P={top:+(q.get("pt")||120),bottom:+(q.get("pb")||120),left:+(q.get("pl")||90),right:+(q.get("pr")||90)};
const map=new maplibregl.Map({container:"map",style:"https://basemaps.cartocdn.com/gl/positron-gl-style/style.json",
  bounds:[[14.18,42.09],[14.78,42.50]],bearing:BEARING,preserveDrawingBuffer:true,fadeDuration:0,
  fitBoundsOptions:{padding:P,bearing:BEARING},interactive:false});
map.on("load",()=>{
  try{map.getStyle().layers.forEach(l=>{if(l.type==="fill"&&/water|ocean|sea|marine/i.test(l.id))map.setPaintProperty(l.id,"fill-color","#cfe8f4");});}catch(e){}
  map.addSource("route",{type:"geojson",data:{type:"Feature",geometry:{type:"LineString",coordinates:ROUTE}}});
  map.addLayer({id:"g",type:"line",source:"route",layout:{"line-cap":"round","line-join":"round"},paint:{"line-color":"#15a3a3","line-width":11,"line-opacity":.18}});
  map.addLayer({id:"r",type:"line",source:"route",layout:{"line-cap":"round","line-join":"round"},paint:{"line-color":"#0f7d80","line-width":3.4,"line-dasharray":[1.4,1.4]}});
  POIS.forEach(p=>{const m=document.createElement("div");m.className="map-mk map-mk-"+p.type+(p.major?" map-mk-major":"")+" side-"+p.side;m.innerHTML='<span class="map-lbl">'+p.n+'</span><span class="map-dot"></span>';new maplibregl.Marker({element:m,anchor:p.side==="bottom"?"top":"bottom"}).setLngLat(p.c).addTo(map);});
  map.once("idle",()=>{document.title="MAP_READY";});
});
</script>
</body>
</html>
